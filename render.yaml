services:
  - type: web
    name: shinen-report-site
    runtime: python
    buildCommand: "python -m py_compile server.py"
    startCommand: "python server.py"
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: APP_STORAGE_DIR
        value: /var/data
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ADMIN_USER
        value: shinen
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: shinen-report-data
      mountPath: /var/data
      sizeGB: 1
